before:
  hooks:
    - go mod download
builds:
  - main: ./cmd/vault-plugin-secrets-oauth-token-exchange
    id: "vault-plugin-secrets-oauth-token-exchange"
    binary: vault-plugin-secrets-oauth-token-exchange
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
archives:
  - replacements:
      darwin: Darwin
      linux: Linux
      windows: Windows
      386: i386
      amd64: x86_64
checksum:
  name_template: 'checksums.txt'
snapshot:
  name_template: "{{ .Tag }}-next"
release:
  prerelease: true
changelog:
  sort: asc
  filters:
    exclude:
      - '^docs:'
      - '^test:'